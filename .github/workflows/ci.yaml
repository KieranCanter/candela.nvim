name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-slim

    env:
      SELENE_VERSION: "0.30.1"
      STYLUA_VERSION: "2.4.0"

    steps:
      - uses: actions/checkout@v6

      - name: Install Lint Deps
        run: sudo apt-get install -y unzip curl

      - name: Install Selene
        run: |
          curl -L https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip -o selene.zip
          unzip selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/

      - name: Install StyLua
        run: |
          curl -L https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip -o stylua.zip
          unzip stylua.zip
          chmod +x stylua
          sudo mv stylua /usr/local/bin/

      - name: Lint All
        run: ./scripts/run-lint.sh

  unit-tests:
    runs-on: ubuntu-slim

    env:
      NEOVIM_VERSION: "v0.11.0"
      PLENARY_VERSION: "v0.1.4"
      RIPGREP_VERSION: "14.1.1"

    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        run: |
          curl -L https://github.com/neovim/neovim/releases/download/${NEOVIM_VERSION}/nvim-linux-x86_64.tar.gz -o nvim.tar.gz
          tar xzf nvim.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          echo "/opt/nvim/bin" >> $GITHUB_PATH

      - name: Install ripgrep
        run: |
          curl -L https://github.com/BurntSushi/ripgrep/releases/download/${RIPGREP_VERSION}/ripgrep-${RIPGREP_VERSION}-x86_64-unknown-linux-musl.tar.gz -o rg.tar.gz
          tar xzf rg.tar.gz
          sudo mv ripgrep-${RIPGREP_VERSION}-x86_64-unknown-linux-musl/rg /usr/local/bin/

      - name: Clone plenary.nvim
        run: git clone --depth 1 --branch ${PLENARY_VERSION} https://github.com/nvim-lua/plenary.nvim /tmp/plenary.nvim

      - name: Run Unit Tests
        run: PLENARY_PATH=/tmp/plenary.nvim ./scripts/run-unit-tests.sh
